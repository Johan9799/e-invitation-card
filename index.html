<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-invitation card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        /* บังคับให้ iframe ขยายเต็มหน้าจอ 100% เพื่อดันแถบเครดิตด้านล่างของ Canva ให้จมหายไป */
        iframe { width: 100% !important; height: 100vh !important; border: none !important; display: block !important; }
        .canvas-container { position: relative; width: 100%; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>

    <div class="canvas-container">
        <iframe loading="lazy" src="https://www.canva.com/design/DAHNQUh3F1c/zejnjHtwp6TWXWLGYPNaZA/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
    </div>

</body>
</html>
