<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-invitation card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000000; }
        
        /* จัดวางตู้คอนเทนเนอร์ให้อยู่กึ่งกลางหน้าจอมือถือเสมอ */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        /* ล็อกสัดส่วนชิ้นงานแนวนอนให้สมมาตร ไม่โดนบีบจนตัวหนังสือพัง */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            height: 0;
            padding-top: 56.25%; /* ล็อกสัดส่วน 16:9 อ้างอิงจากโค้ดต้นฉบับ Canva */
        }
        
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            display: block !important; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="canvas-container">
            <iframe loading="lazy" src="https://www.canva.com/design/DAHNQUh3F1c/zejnjHtwp6TWXWLGYPNaZA/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
        </div>
    </div>

</body>
</html>
